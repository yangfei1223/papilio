<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Papilio</title>
<script src="/htmx.min.js"></script>
<style>
  :root {
    --bg: #f4f1ea;
    --surface: #fffdf8;
    --surface-strong: #ffffff;
    --text: #24211d;
    --muted: #766f66;
    --faint: #9b948a;
    --border: #ded7cb;
    --border-soft: #ebe5db;
    --accent: #2f6f73;
    --accent-ink: #18464a;
    --amber: #a66218;
    --green: #4d7f45;
    --red: #a94b42;
    --purple: #6f5b9a;
    --blue: #496fa8;
    --shadow: 0 18px 50px rgba(49, 42, 32, .08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    line-height: 1.5;
  }

  a { color: inherit; }

  .layout {
    display: grid;
    grid-template-columns: 248px minmax(0, 1fr);
    max-width: 1280px;
    min-height: 100vh;
    margin: 0 auto;
  }

  .sidebar {
    position: sticky;
    top: 0;
    height: 100vh;
    padding: 28px 18px;
    border-right: 1px solid var(--border);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
    color: var(--text);
    text-decoration: none;
  }

  .brand-mark {
    width: 38px;
    height: 38px;
    border: 1px solid var(--border);
    border-radius: 8px;
    display: grid;
    place-items: center;
    background: var(--surface);
    color: var(--accent-ink);
    font-weight: 800;
  }

  .brand-copy strong {
    display: block;
    font-size: 15px;
  }

  .brand-copy span {
    display: block;
    font-size: 12px;
    color: var(--muted);
  }

  .nav-label {
    margin: 22px 10px 8px;
    color: var(--faint);
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .08em;
  }

  .sidebar nav {
    display: grid;
    gap: 4px;
  }

  .sidebar nav a {
    display: flex;
    align-items: center;
    justify-content: space-between;
    min-height: 36px;
    padding: 8px 10px;
    border-radius: 8px;
    color: var(--muted);
    text-decoration: none;
    font-size: 14px;
  }

  .sidebar nav a:hover,
  .sidebar nav a.active {
    background: rgba(255, 255, 255, .68);
    color: var(--text);
    box-shadow: inset 0 0 0 1px var(--border-soft);
  }

  .nav-dot {
    width: 8px;
    height: 8px;
    border-radius: 99px;
    background: var(--border);
  }

  .nav-dot.hn { background: var(--amber); }
  .nav-dot.arxiv { background: var(--red); }
  .nav-dot.github { background: var(--text); }
  .nav-dot.hf { background: var(--purple); }
  .nav-dot.rss { background: var(--green); }

  .stats-slot { margin-top: 22px; }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .stats-grid div {
    min-height: 58px;
    padding: 10px;
    border: 1px solid var(--border-soft);
    border-radius: 8px;
    background: rgba(255, 253, 248, .7);
  }

  .stats-grid span {
    display: block;
    font-size: 18px;
    font-weight: 750;
  }

  .stats-grid small {
    display: block;
    margin-top: 2px;
    color: var(--muted);
    font-size: 11px;
  }

  .main { padding: 28px 34px 48px; }

  .feed-panel {
    max-width: 940px;
    margin: 0 auto;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--surface);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .feed-heading {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 20px;
    padding: 22px 24px 18px;
    border-bottom: 1px solid var(--border-soft);
    background: rgba(255, 255, 255, .56);
  }

  .eyebrow {
    margin-bottom: 3px;
    color: var(--accent);
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: .1em;
  }

  .feed-heading h1 {
    font-size: 24px;
    line-height: 1.15;
    letter-spacing: 0;
  }

  .feed-count {
    flex-shrink: 0;
    color: var(--muted);
    font-size: 13px;
  }

  .item-list { display: grid; }

  .item-row {
    display: grid;
    grid-template-columns: 48px minmax(0, 1fr) 120px;
    gap: 14px;
    padding: 16px 18px;
    border-bottom: 1px solid var(--border-soft);
  }

  .item-row:hover { background: #fffaf0; }

  .source-tile {
    width: 44px;
    height: 44px;
    border-radius: 8px;
    display: grid;
    place-items: center;
    border: 1px solid currentColor;
    background: #f8f4ec;
    color: var(--accent);
    font-size: 12px;
    font-weight: 850;
  }

  .source-hackernews .source-tile,
  .source-tile.source-hackernews {
    color: var(--amber);
    background: #fff3df;
  }

  .source-arxiv .source-tile,
  .source-tile.source-arxiv {
    color: var(--red);
    background: #fff0ed;
  }

  .source-github .source-tile,
  .source-tile.source-github {
    color: var(--text);
    background: #efede8;
  }

  .source-huggingface .source-tile,
  .source-tile.source-huggingface {
    color: var(--purple);
    background: #f3efff;
  }

  .source-rss .source-tile,
  .source-tile.source-rss {
    color: var(--green);
    background: #edf7ea;
  }

  .item-main { min-width: 0; }

  .item-title {
    font-size: 16px;
    line-height: 1.34;
    font-weight: 720;
    letter-spacing: 0;
  }

  .item-title a {
    color: var(--text);
    text-decoration: none;
  }

  .item-title a:hover {
    color: var(--accent-ink);
    text-decoration: underline;
    text-decoration-thickness: 1px;
    text-underline-offset: 3px;
  }

  .item-summary {
    margin-top: 7px;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.55;
  }

  .item-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
  }

  .meta-chip {
    display: inline-flex;
    align-items: center;
    min-height: 22px;
    padding: 2px 7px;
    border: 1px solid var(--border-soft);
    border-radius: 999px;
    color: var(--muted);
    background: rgba(255, 255, 255, .6);
    font-size: 11px;
    white-space: nowrap;
  }

  .category-chip { color: var(--accent-ink); }
  .status-processed { color: var(--green); }
  .status-saving { color: var(--amber); }
  .status-saved { color: var(--purple); }

  .wiki-link {
    margin-top: 8px;
    color: var(--purple);
    font-size: 12px;
  }

  .wiki-link a {
    color: var(--purple);
    text-decoration: none;
  }

  .item-side {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
  }

  .priority-pill,
  .wiki-action {
    min-width: 82px;
    min-height: 28px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 750;
  }

  .priority-pill {
    border: 1px solid var(--border-soft);
    color: var(--muted);
    background: #fbf8f1;
  }

  .priority-high {
    color: var(--red);
    background: #fff0ed;
    border-color: #f0c7c0;
  }

  .priority-medium {
    color: var(--amber);
    background: #fff3df;
    border-color: #ecd3ad;
  }

  .priority-low {
    color: var(--blue);
    background: #eef3ff;
    border-color: #cbd8f0;
  }

  .wiki-action {
    border: 1px solid var(--border);
    background: var(--surface-strong);
    color: var(--text);
    text-decoration: none;
  }

  .wiki-action-button {
    cursor: pointer;
    font-family: inherit;
  }

  .wiki-action-button:hover {
    border-color: var(--accent);
    color: var(--accent-ink);
    background: #eef7f5;
  }

  .wiki-action-saving { color: var(--amber); }
  .wiki-action-saved { color: var(--green); }

  .empty-state {
    padding: 64px 24px;
    text-align: center;
    color: var(--muted);
  }

  .empty-icon {
    width: 52px;
    height: 52px;
    margin: 0 auto 14px;
    border-radius: 10px;
    display: grid;
    place-items: center;
    background: #eef7f5;
    color: var(--accent-ink);
    font-weight: 850;
  }

  .empty-state h2 {
    color: var(--text);
    font-size: 18px;
    margin-bottom: 4px;
  }

  .loading {
    padding: 24px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
  }

  @media (max-width: 760px) {
    .layout { display: block; }

    .sidebar {
      position: static;
      height: auto;
      border-right: 0;
      border-bottom: 1px solid var(--border);
    }

    .sidebar nav { grid-template-columns: 1fr 1fr; }
    .main { padding: 18px 12px 32px; }
    .feed-heading {
      align-items: flex-start;
      flex-direction: column;
    }

    .item-row { grid-template-columns: 42px minmax(0, 1fr); }
    .source-tile {
      width: 38px;
      height: 38px;
    }

    .item-side {
      grid-column: 2;
      flex-direction: row;
      align-items: center;
      justify-content: flex-start;
    }
  }
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <a class="brand" href="/">
      <span class="brand-mark">PX</span>
      <span class="brand-copy">
        <strong>Papilio</strong>
        <span>Reading inbox</span>
      </span>
    </a>

    <p class="nav-label">Sources</p>
    <nav>
      <a href="/?source=" class="active" hx-get="/ui/items?per_page=50" hx-target="#feed" hx-swap="innerHTML" hx-push-url="true">All <span class="nav-dot"></span></a>
      <a href="/?source=hackernews" hx-get="/ui/items?source=hackernews&per_page=50" hx-target="#feed" hx-swap="innerHTML" hx-push-url="true">Hacker News <span class="nav-dot hn"></span></a>
      <a href="/?source=arxiv" hx-get="/ui/items?source=arxiv&per_page=50" hx-target="#feed" hx-swap="innerHTML" hx-push-url="true">arXiv <span class="nav-dot arxiv"></span></a>
      <a href="/?source=github" hx-get="/ui/items?source=github&per_page=50" hx-target="#feed" hx-swap="innerHTML" hx-push-url="true">GitHub <span class="nav-dot github"></span></a>
      <a href="/?source=huggingface" hx-get="/ui/items?source=huggingface&per_page=50" hx-target="#feed" hx-swap="innerHTML" hx-push-url="true">HuggingFace <span class="nav-dot hf"></span></a>
      <a href="/?source=rss" hx-get="/ui/items?source=rss&per_page=50" hx-target="#feed" hx-swap="innerHTML" hx-push-url="true">RSS <span class="nav-dot rss"></span></a>
    </nav>

    <p class="nav-label">State</p>
    <div class="stats-slot" hx-get="/ui/stats" hx-trigger="load" hx-swap="innerHTML"></div>
  </aside>

  <main class="main">
    <div id="feed" hx-get="/ui/items?per_page=50" hx-trigger="load" hx-swap="innerHTML">
      <section class="feed-panel">
        <div class="loading">Loading Papilio inbox...</div>
      </section>
    </div>
  </main>
</div>
</body>
</html>
